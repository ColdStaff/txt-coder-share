    };

    const unlockEncoder = new TextEncoder();
    const unlockDecoder = new TextDecoder();
    const unlockForm = document.querySelector("#unlockForm");
    const unlockButton = document.querySelector("#unlockButton");
    const unlockError = document.querySelector("#error");

    function base64UrlToBytes(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
      const binary = atob(base64);
      return Uint8Array.from(binary, (char) => char.charCodeAt(0));
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        unlockEncoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: base64UrlToBytes(unlockPayload.salt),
          iterations: unlockPayload.iterations,
          hash: "SHA-256"
        },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    unlockForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      unlockButton.disabled = true;
      unlockButton.textContent = "Проверяю";
      unlockError.classList.remove("visible");

      try {
        const key = await deriveKey(new FormData(unlockForm).get("password"));
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: base64UrlToBytes(unlockPayload.iv) },
          key,
          base64UrlToBytes(unlockPayload.data)
        );

        document.open();
        document.write(unlockDecoder.decode(decrypted));
        document.close();
      } catch {
        unlockError.textContent = "Неверный пароль.";
        unlockError.classList.add("visible");
        unlockButton.disabled = false;
        unlockButton.textContent = "Открыть";
      }
    });
    })();
