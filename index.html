      color: #17212b;

      width: 100%;
      height: 46px;
      border: 1px solid #bfccd6;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
    }
    input:focus { outline: 3px solid rgba(16, 118, 157, 0.2); border-color: #10769d; }
    button {
      width: 100%;
      height: 46px;
      margin-top: 16px;
      border: 0;
      border-radius: 6px;
      background: #10769d;
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: #0c5e7d; }
    .error {
      display: none;
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #ffe9e9;
      color: #9b1b1b;
      font-weight: 750;
    }
    .error.visible { display: block; }

    };

    const encoder = new TextEncoder();
    const decoder = new TextDecoder();
    const form = document.querySelector("#unlockForm");
    const button = document.querySelector("#unlockButton");
    const error = document.querySelector("#error");

    function base64UrlToBytes(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
      const binary = atob(base64);
      return Uint8Array.from(binary, (char) => char.charCodeAt(0));
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: base64UrlToBytes(payload.salt),
          iterations: payload.iterations,
          hash: "SHA-256"
        },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      button.textContent = "Проверяю";
      error.classList.remove("visible");

      try {
        const key = await deriveKey(new FormData(form).get("password"));
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: base64UrlToBytes(payload.iv) },
          key,
          base64UrlToBytes(payload.data)
        );

        document.open();
        document.write(decoder.decode(decrypted));
        document.close();
      } catch {
        error.textContent = "Неверный пароль.";
        error.classList.add("visible");
        button.disabled = false;
        button.textContent = "Открыть";
      }
    });
